<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | Hospital Booking</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body data-page="login">
  <nav class="navbar navbar-expand-lg bg-body-tertiary shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">🏥 Hospital Booking</a>
    </div>
  </nav>

  <main class="py-5">
    <div class="container" style="max-width: 520px;">
      <ul class="nav nav-pills mb-3" id="authTab" role="tablist">
        <li class="nav-item" role="presentation">
          <button class="nav-link active" id="login-tab" data-bs-toggle="pill" data-bs-target="#login-pane" type="button" role="tab">Login 🔐</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" id="signup-tab" data-bs-toggle="pill" data-bs-target="#signup-pane" type="button" role="tab">Sign Up ✍️</button>
        </li>
      </ul>

      <div class="tab-content">
        <!-- Login -->
        <div class="tab-pane fade show active" id="login-pane" role="tabpanel">
          <form id="loginForm" class="card card-body">
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" id="loginEmail" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" id="loginPassword" required>
            </div>
            <button class="btn btn-primary" type="submit">Login</button>
          </form>
        </div>
        <!-- Signup -->
        <div class="tab-pane fade" id="signup-pane" role="tabpanel">
          <form id="signupForm" class="card card-body">
            <div class="mb-3">
              <label class="form-label">Full Name</label>
              <input type="text" class="form-control" id="signupName" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" id="signupEmail" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" id="signupPassword" minlength="6" required>
            </div>
            <button class="btn btn-success" type="submit">Create Account</button>
          </form>
          <p class="text-muted small mt-2">Note: This demo stores data in your browser only (localStorage).</p>
        </div>
      </div>
    </div>
  </main>

  <footer class="py-4 border-top">
    <div class="container text-center text-muted small">
      © <span id="year"></span> Hospital Booking — Demo Project
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
